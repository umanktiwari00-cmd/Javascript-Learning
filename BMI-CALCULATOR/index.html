<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
   
    <div class="container">
         <h1>BMI Calculator</h1>
        <form>
            <p><label>Height in CM: </label><input type="text" placeholder="height" id="height" ></p>
            <p><label>Weight in KG: </label><input type="text" placeholder="Weight" id="weight" ></p>
            <button>Calculate</button>
            <div id="results"></div>
            <div id="weight-guide">
            <h3>BMI Weight Guide</h3>
            <p id="1">Under Weight = Less than 18.6</p>
            <p id="2">Normal Range = 18.6 and 24.9</p>
            <p id="3">Overweight = Greater than 24.9</p>
            </div>
        </form>
    </div>
    <script src="script.js"></script>
</body>
</html>
